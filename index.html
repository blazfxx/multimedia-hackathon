<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Demo</title>
<style>
body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 16px; }
section { margin-bottom: 24px; }
h2 { margin-bottom: 8px; }
.box { border: 1px solid #ccc; padding: 8px; min-height: 40px; max-height: 300px; overflow-y: auto; margin-bottom: 8px; white-space: pre-wrap; }
.seg-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid #eee; }
.seg-row .ts { min-width: 90px; color: #666; font-size: 0.85em; }
.seg-row .seg-text { flex: 1; }
button { margin-right: 4px; }
p { margin: 4px 0; }
</style>
</head>
<body>
<h1>AI Demo</h1>

<section>
  <h2>Transcription</h2>
  <div id="transcript-results" class="box"></div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <input type="file" id="audio-file" accept="audio/*,video/mp4,.mp3,.wav,.m4a,.webm,.ogg">
    <button id="rec-btn" title="Record voice">&#127908;</button>
    <button id="clear-trans-btn">Clear</button>
  </div>
  <p id="trans-status"></p>
</section>

<hr>

<section>
  <h2>Stock Footage Keywords</h2>
  <div id="keywords-results" class="box"></div>
  <button id="gen-kw-btn" disabled>Generate Keywords</button>
  <p id="kw-status"></p>
</section>

<script type="module">
import { isSpeechSupported, listen, transcribeFile, saveTranscription } from "./js/transcribe.js?v=8";
import { buildFootageSegments, generateKeywords, fmt } from "./js/keywords.js?v=8";

const audioFile = document.getElementById("audio-file");
const recBtn = document.getElementById("rec-btn");
const clearTransBtn = document.getElementById("clear-trans-btn");
const transStatus = document.getElementById("trans-status");
const transcriptResults = document.getElementById("transcript-results");

const genKwBtn = document.getElementById("gen-kw-btn");
const kwStatus = document.getElementById("kw-status");
const keywordsResults = document.getElementById("keywords-results");

let lastSegments = null;
let lastDuration = null;

if (!isSpeechSupported()) {
  recBtn.disabled = true;
  recBtn.title = "Speech Recognition not supported (use Chrome)";
}

function renderSegments(segments, duration) {
  transcriptResults.innerHTML = "";
  if (duration) {
    const durDiv = document.createElement("div");
    durDiv.innerHTML = `<strong>Duration:</strong> ${fmt(duration)}`;
    transcriptResults.appendChild(durDiv);
  }
  segments.forEach(s => {
    const div = document.createElement("div");
    div.className = "seg-row";
    div.innerHTML = `<span class="ts">[${fmt(s.start)} - ${fmt(s.end)}]</span><span class="seg-text">${escHtml(s.text)}</span>`;
    transcriptResults.appendChild(div);
  });
  transcriptResults.scrollTop = transcriptResults.scrollHeight;
}

audioFile.addEventListener("change", async () => {
  const file = audioFile.files[0];
  if (!file) return;
  transStatus.textContent = "Transcribing file...";
  audioFile.disabled = true;
  try {
    const result = await transcribeFile(file);
    lastSegments = result.segments;
    lastDuration = result.duration;
    renderSegments(result.segments, result.duration);
    saveTranscription(file.name, result);
    genKwBtn.disabled = false;
    transStatus.textContent = "";
  } catch (err) {
    transStatus.textContent = err.message;
  }
  audioFile.disabled = false;
  audioFile.value = "";
});

recBtn.addEventListener("click", async () => {
  recBtn.disabled = true;
  transStatus.textContent = "Listening...";
  try {
    const text = await listen();
    const seg = { start: 0, end: 10, text };
    lastSegments = [seg];
    lastDuration = 10;
    renderSegments(lastSegments, lastDuration);
    saveTranscription("mic", { text, duration: lastDuration, segments: lastSegments });
    genKwBtn.disabled = false;
    transStatus.textContent = "";
  } catch (err) {
    transStatus.textContent = err.message;
  }
  recBtn.disabled = false;
});

clearTransBtn.addEventListener("click", () => {
  transcriptResults.innerHTML = "";
  keywordsResults.innerHTML = "";
  localStorage.removeItem("transcriptions");
  lastSegments = null;
  lastDuration = null;
  genKwBtn.disabled = true;
});

genKwBtn.addEventListener("click", async () => {
  if (!lastSegments || !lastDuration) return;
  const footageSegs = buildFootageSegments(lastSegments, lastDuration);
  genKwBtn.disabled = true;
  kwStatus.textContent = "Generating keywords...";
  keywordsResults.innerHTML = "";
  try {
    const raw = await generateKeywords(footageSegs, (token) => {
      keywordsResults.textContent += token;
      keywordsResults.scrollTop = keywordsResults.scrollHeight;
    });
    keywordsResults.textContent = raw;
    kwStatus.textContent = `Each segment = 15% of total audio (${fmt(lastDuration)})`;
  } catch (err) {
    keywordsResults.textContent = err.message;
    kwStatus.textContent = "";
  }
  genKwBtn.disabled = false;
});

function escHtml(s) {
  const d = document.createElement("span");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
