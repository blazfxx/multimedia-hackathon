<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Demo</title>
<style>
body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 16px; }
#chat-messages { border: 1px solid #ccc; padding: 8px; height: 300px; overflow-y: auto; margin-bottom: 8px; }
#chat-messages div { margin-bottom: 6px; }
#chat-input { width: calc(100% - 60px); }
#rec-btn { margin-left: 4px; }
</style>
</head>
<body>
<h1>AI Demo</h1>
<div id="chat-messages"></div>
<div style="display:flex;align-items:center">
  <input type="text" id="chat-input" placeholder="Type a message...">
  <button id="rec-btn" title="Record voice">&#127908;</button>
</div>
<button id="send-btn">Send</button>
<button id="reset-btn">Reset</button>
<p id="status"></p>
<script type="module">
import { isSupported, listen, saveTranscription, loadTranscriptions, deleteTranscription } from "./js/transcribe.js?v=4";
import { createChat } from "./js/chat.js?v=4";

const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const resetBtn = document.getElementById("reset-btn");
const recBtn = document.getElementById("rec-btn");
const status = document.getElementById("status");
const chatMessages = document.getElementById("chat-messages");

let chat = createChat();

if (!isSupported()) {
  recBtn.disabled = true;
  recBtn.title = "Speech Recognition not supported (use Chrome)";
}

function addMsg(role, content) {
  const div = document.createElement("div");
  div.innerHTML = "<strong>" + role + ":</strong> " + content;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMsg("you", text);
  chatInput.value = "";
  sendBtn.disabled = true;
  status.textContent = "Thinking...";
  try {
    const reply = await chat.send(text);
    addMsg("assistant", reply);
  } catch (err) {
    addMsg("error", err.message);
  }
  status.textContent = "";
  sendBtn.disabled = false;
}

sendBtn.addEventListener("click", () => sendMessage(chatInput.value));
chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendBtn.click(); });

resetBtn.addEventListener("click", () => {
  chat = createChat();
  chatMessages.innerHTML = "";
});

recBtn.addEventListener("click", async () => {
  recBtn.disabled = true;
  status.textContent = "Listening...";
  try {
    const text = await listen();
    chatInput.value = text;
    status.textContent = "";
  } catch (err) {
    status.textContent = err.message;
  }
  recBtn.disabled = false;
});
</script>
</body>
</html>
