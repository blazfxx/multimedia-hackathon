<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Demo</title>
</head>
<body>
<h1>AI Demo</h1>
<p><a href="#transcribe">Transcription</a> | <a href="#chat">Chat API</a></p>
<hr>
<h2 id="transcribe">Audio Transcription (NVIDIA Parakeet ASR)</h2>
<input type="file" id="audio-file" accept="audio/*"><br><br>
<button id="transcribe-btn" disabled>Transcribe</button>
<button id="save-btn" disabled>Save</button>
<p id="t-status"></p>
<h3>Result</h3>
<pre id="t-result"></pre>
<h3>History</h3>
<div id="t-history"></div>
<hr>
<h2 id="chat">Chat (NVIDIA NIM - Gemma 4)</h2>
<label>Preset: </label>
<button onclick="applyPreset('nvidia')">NVIDIA NIM</button>
<button onclick="applyPreset('openai')">OpenAI</button>
<button onclick="applyPreset('openrouter')">OpenRouter</button>
<button onclick="applyPreset('groq')">Groq</button>
<button onclick="applyPreset('together')">Together AI</button>
<button onclick="applyPreset('ollama')">Ollama (local)</button>
<br><br>
<label>Base URL:<br><input type="text" id="base-url" size="60" value="https://integrate.api.nvidia.com/v1"></label><br><br>
<label>API Key:<br><input type="password" id="api-key" size="60" value="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"></label><br><br>
<label>Model:<br><input type="text" id="model" size="60" value="google/gemma-4-31b-it"></label><br><br>
<label>CORS Proxy:<br><input type="text" id="cors-proxy" size="60" value="https://corsproxy.io/?"></label><br><br>
<div id="chat-messages" style="border:1px solid #ccc;padding:8px;max-height:300px;overflow-y:auto;margin-bottom:8px"></div>
<input type="text" id="chat-input" size="60" placeholder="Type a message...">
<button id="send-btn">Send</button>
<button onclick="resetChat()">Reset</button>
<p id="c-status"></p>
<script type="module">
import { transcribeAudio, saveTranscription, loadTranscriptions, deleteTranscription } from "./js/transcribe.js?v=3";
import { PRESETS, createChat } from "./js/chat.js?v=3";
window.applyPreset = (name) => {
const p = PRESETS[name];
if (!p) return;
document.getElementById("base-url").value = p.url;
document.getElementById("model").value = p.model;
if (p.key) document.getElementById("api-key").value = p.key;
};
const fileInput = document.getElementById("audio-file");
const tBtn = document.getElementById("transcribe-btn");
const saveBtn = document.getElementById("save-btn");
const tStatus = document.getElementById("t-status");
const tResult = document.getElementById("t-result");
const tHistory = document.getElementById("t-history");
let lastTranscription = "";
function getProxy() {
const v = document.getElementById("cors-proxy").value.trim();
return v || undefined;
}
fileInput.addEventListener("change", () => {
tBtn.disabled = !fileInput.files.length;
});
tBtn.addEventListener("click", async () => {
if (!fileInput.files.length) return;
const file = fileInput.files[0];
tBtn.disabled = true;
tStatus.textContent = "Transcribing...";
tResult.textContent = "";
try {
const text = await transcribeAudio(file, { corsProxy: getProxy() });
tResult.textContent = text;
lastTranscription = text;
saveBtn.disabled = false;
} catch (err) {
tResult.textContent = "Error: " + err.message;
}
tStatus.textContent = "";
tBtn.disabled = false;
});
saveBtn.addEventListener("click", () => {
if (!lastTranscription || !fileInput.files.length) return;
saveTranscription(fileInput.files[0].name, lastTranscription);
saveBtn.disabled = true;
renderHistory();
});
function renderHistory() {
const items = loadTranscriptions();
if (!items.length) {
tHistory.innerHTML = "<p><em>None yet.</em></p>";
return;
}
tHistory.innerHTML = items.map((item, i) =>
`<div style="border:1px solid #ccc;padding:8px;margin-bottom:6px">` +
`<strong>${item.filename}</strong> — ${new Date(item.date).toLocaleString()} ` +
`<button onclick="delT(${i})">Delete</button>` +
`<pre>${item.text}</pre></div>`
).join("");
}
window.delT = (i) => { deleteTranscription(i); renderHistory(); };
renderHistory();
let chat = null;
function getChat() {
if (!chat) {
chat = createChat(
document.getElementById("base-url").value,
document.getElementById("api-key").value,
document.getElementById("model").value,
"You are a helpful assistant.",
getProxy()
);
}
return chat;
}
window.resetChat = () => { chat = null; document.getElementById("chat-messages").innerHTML = ""; };
const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const cStatus = document.getElementById("c-status");
const chatMessages = document.getElementById("chat-messages");
function addMsg(role, content) {
const div = document.createElement("div");
div.innerHTML = `<strong>${role}:</strong> ${content}`;
chatMessages.appendChild(div);
chatMessages.scrollTop = chatMessages.scrollHeight;
}
sendBtn.addEventListener("click", async () => {
const text = chatInput.value.trim();
if (!text) return;
chat = null;
const c = getChat();
addMsg("you", text);
chatInput.value = "";
sendBtn.disabled = true;
cStatus.textContent = "Thinking...";
try {
const reply = await c.send(text);
addMsg("assistant", reply);
} catch (err) {
addMsg("error", err.message);
}
cStatus.textContent = "";
sendBtn.disabled = false;
});
chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendBtn.click(); });
</script>
</body>
</html>
