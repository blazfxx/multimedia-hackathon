<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Compiler</title>
<script src="coi-serviceworker.js"></script>
<style>
body{font-family:sans-serif;max-width:700px;margin:0 auto;padding:16px}
h1{margin:0 0 4px}
.ver{color:#888;font-size:0.8em;margin:0 0 16px}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.box{border:1px solid #ccc;padding:8px;min-height:40px;max-height:300px;overflow-y:auto;margin-bottom:8px;white-space:pre-wrap;font-size:0.9em}
.seg-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid #eee}
.seg-row .ts{min-width:90px;color:#666;font-size:0.85em}
.seg-row .seg-text{flex:1}
.footage-grid{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.footage-card{border:1px solid #ddd;border-radius:4px;overflow:hidden;width:180px}
.footage-card img{width:100%;height:100px;object-fit:cover}
.footage-card .info{padding:4px;font-size:0.8em}
.progress-bar{width:100%;height:20px;background:#eee;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#4a9;transition:width 0.3s}
video{width:100%;max-width:640px;margin:8px 0}
#status{padding:8px;border-radius:4px;margin-bottom:12px;display:none}
#status.info{background:#e8f4fd;display:block}
#status.ok{background:#e6f9e6;display:block}
#status.err{background:#fde8e8;display:block}
section{margin-bottom:16px}
h2{margin:0 0 6px;font-size:1.1em}
a[download]{display:inline-block;margin:8px 0}
</style>
</head>
<body>
<h1>AI Video Compiler</h1>
<p class="ver">v1.2.0</p>
<div class="controls">
<input type="file" id="audio-file" accept="audio/*,video/mp4,.mp3,.wav,.m4a,.webm,.ogg">
<button id="start-btn" disabled>Start</button>
</div>
<div id="status"></div>
<div class="progress-bar"><div id="progress" class="progress-fill" style="width:0%"></div></div>
<section>
<h2>Transcription</h2>
<div id="transcript-box" class="box"></div>
</section>
<section>
<h2>Keywords</h2>
<div id="keywords-box" class="box"></div>
</section>
<section>
<h2>Stock Footage</h2>
<div id="footage-grid" class="footage-grid"></div>
</section>
<section>
<h2>Output</h2>
<p id="ffmpeg-status">Loading FFmpeg from proxy...</p>
<video id="output-video" controls style="display:none"></video>
<a id="download-link" style="display:none" download="output.mp4">Download Video</a>
</section>
<script type="module">
import { transcribeFile, saveTranscription } from "./js/transcribe.js?v=12";
import { buildFootageSegments, generateKeywords, fmt } from "./js/keywords.js?v=12";
import { parseKeywords, searchFootageForSegments, downloadVideo } from "./js/footage.js?v=12";
import { initFFmpeg, compileVideo } from "./js/compose.js?v=37";
const audioFile = document.getElementById("audio-file");
const startBtn = document.getElementById("start-btn");
const statusEl = document.getElementById("status");
const progressEl = document.getElementById("progress");
const transcriptBox = document.getElementById("transcript-box");
const keywordsBox = document.getElementById("keywords-box");
const footageGrid = document.getElementById("footage-grid");
const ffmpegStatus = document.getElementById("ffmpeg-status");
const outputVideo = document.getElementById("output-video");
const downloadLink = document.getElementById("download-link");
let ffmpegLoaded = false;
let running = false;
initFFmpeg((msg) => {
  ffmpegStatus.textContent = msg.slice(0, 80);
}).then(() => {
  ffmpegLoaded = true;
  ffmpegStatus.textContent = "FFmpeg ready";
}).catch((err) => {
  ffmpegStatus.textContent = "FFmpeg load failed: " + err.message;
});
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type;
}
function setProgress(p) {
  progressEl.style.width = `${Math.round(p * 100)}%`;
}
function escHtml(s) {
  const d = document.createElement("span");
  d.textContent = s;
  return d.innerHTML;
}
function renderSegments(segments, duration) {
  transcriptBox.innerHTML = "";
  if (duration) {
    const durDiv = document.createElement("div");
    durDiv.innerHTML = `<strong>Duration:</strong> ${fmt(duration)}`;
    transcriptBox.appendChild(durDiv);
  }
  segments.forEach(s => {
    const div = document.createElement("div");
    div.className = "seg-row";
    div.innerHTML = `<span class="ts">[${fmt(s.start)} - ${fmt(s.end)}]</span><span class="seg-text">${escHtml(s.text)}</span>`;
    transcriptBox.appendChild(div);
  });
}
audioFile.addEventListener("change", () => {
  startBtn.disabled = !audioFile.files.length;
});
startBtn.addEventListener("click", async () => {
  if (running) return;
  const file = audioFile.files[0];
  if (!file) return;
  running = true;
  startBtn.disabled = true;
  audioFile.disabled = true;
  transcriptBox.innerHTML = "";
  keywordsBox.innerHTML = "";
  footageGrid.innerHTML = "";
  outputVideo.style.display = "none";
  downloadLink.style.display = "none";
  setProgress(0);
  try {
    // Step 1: Transcribe
    setStatus("Transcribing audio...", "info");
    setProgress(0.05);
    const result = await transcribeFile(file);
    const segments = result.segments;
    const duration = result.duration;
    renderSegments(segments, duration);
    saveTranscription(file.name, result);
    setProgress(0.2);

    // Step 2: Generate keywords
    setStatus("Generating stock footage keywords...", "info");
    const footageSegs = buildFootageSegments(segments, duration);
    let rawKeywords = "";
    await generateKeywords(footageSegs, (token) => {
      rawKeywords += token;
      keywordsBox.textContent = rawKeywords;
      keywordsBox.scrollTop = keywordsBox.scrollHeight;
    });
    setProgress(0.4);

    // Step 3: Search footage
    setStatus("Searching stock footage...", "info");
    const parsed = parseKeywords(rawKeywords);
    if (!parsed.length) {
      setStatus("No segments parsed from keywords.", "err");
      running = false;
      startBtn.disabled = false;
      audioFile.disabled = false;
      return;
    }
    const footageResults = await searchFootageForSegments(parsed, 1);
    for (const seg of footageResults) {
      if (!seg.videos.length) continue;
      const v = seg.videos[0];
      const card = document.createElement("div");
      card.className = "footage-card";
      card.innerHTML = `<img src="${v.image}" alt="footage"><div class="info">Seg ${seg.index}: ${seg.keywords.join(", ")}</div>`;
      footageGrid.appendChild(card);
    }
    setProgress(0.55);

    // Step 4: Compile video
    if (!ffmpegLoaded) {
      setStatus("FFmpeg not loaded yet. Please wait and try again.", "err");
      running = false;
      startBtn.disabled = false;
      audioFile.disabled = false;
      return;
    }
    setStatus("Downloading stock videos & compiling...", "info");
    const merged = [];
    for (let i = 0; i < footageSegs.length; i++) {
      const match = footageResults.find(f => f.index === i + 1);
      const videoEntry = match?.videos?.[0];
      let videoData = null;
      if (videoEntry?.videoUrl) {
        try { videoData = await downloadVideo(videoEntry.videoUrl); } catch (e) { /* skip */ }
      }
      merged.push({ ...footageSegs[i], videoData });
    }
    const withVideo = merged.filter(s => s.videoData);
    if (!withVideo.length) {
      setStatus("No stock videos downloaded.", "err");
      running = false;
      startBtn.disabled = false;
      audioFile.disabled = false;
      return;
    }
    setProgress(0.65);
    const blob = await compileVideo({
      footageSegments: withVideo,
      audioFile: file,
      onProgress: (p) => { setProgress(0.65 + p * 0.35); }
    });
    const url = URL.createObjectURL(blob);
    outputVideo.src = url;
    outputVideo.style.display = "block";
    downloadLink.href = url;
    downloadLink.style.display = "inline";
    setProgress(1);
    setStatus("Done!", "ok");
  } catch (err) {
    setStatus("Error: " + err.message, "err");
  }
  running = false;
  startBtn.disabled = false;
  audioFile.disabled = false;
  audioFile.value = "";
});
</script>
</body>
</html>
